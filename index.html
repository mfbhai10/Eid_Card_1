<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eid Card | Eid Mubarak E-Card Generator</title>
    <meta
      name="description"
      content="Generate and download a beautiful personalised Eid Mubarak e-card with an Islamic reminder. Share with family and friends."
    />
    <meta property="og:title" content="Eid Card Generator" />
    <meta
      property="og:description"
      content="Create your personalised Eid Mubarak e-card with an Islamic reminder and share it with your loved ones."
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#001d1e" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!--  Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Winky+Sans&family=Galada&display=swap"
      rel="stylesheet"
    />

    <style>
      #ecard {
        background: linear-gradient(
          0deg,
          rgba(0, 29, 30, 0.7) 0%,
          rgba(49, 49, 42, 0.7) 100%
        );
        background-size: cover;
        background-position: center;
        background-blend-mode: overlay;
        transition: background 0.5s ease-in-out;
        border: 1.5px solid rgba(251, 191, 36, 0.38);
        box-shadow:
          0 0 0 5px rgba(0, 0, 0, 0.35),
          inset 0 0 70px rgba(0, 0, 0, 0.28),
          0 8px 40px rgba(0, 0, 0, 0.6);
      }

      /* ── Ornamental horizontal rule ── */
      .ornamental-divider {
        display: flex;
        align-items: center;
        gap: 7px;
        width: 75%;
        margin: 6px auto;
        color: rgba(251, 191, 36, 0.65);
        font-size: 11px;
        letter-spacing: 2px;
      }
      .ornamental-divider::before {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          rgba(251, 191, 36, 0.5)
        );
      }
      .ornamental-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          to left,
          transparent,
          rgba(251, 191, 36, 0.5)
        );
      }

      /* ── Hadith quote block ── */
      .hadith-block {
        position: relative;
        background: rgba(0, 0, 0, 0.28);
        border: 1px solid rgba(251, 191, 36, 0.18);
        border-left: 3px solid rgba(251, 191, 36, 0.55);
        border-radius: 4px;
        padding: 9px 13px 9px 15px;
        width: calc(100% - 32px);
        /* backdrop-filter removed: html2canvas does not support it */
      }
      .hadith-block::before {
        content: "\201C";
        position: absolute;
        top: -6px;
        left: 8px;
        font-size: 32px;
        line-height: 1;
        color: rgba(251, 191, 36, 0.35);
        font-family: Georgia, serif;
      }

      /* ── Title shimmer ── */
      @keyframes shimmer {
        0% {
          background-position: -200% center;
        }
        100% {
          background-position: 200% center;
        }
      }
      .title-shimmer {
        background: linear-gradient(
          90deg,
          #f59e0b 0%,
          #fde68a 40%,
          #f59e0b 60%,
          #fbbf24 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 4s linear infinite;
      }

      /* ── Crescent badge ── */
      .crescent-badge {
        display: block;
        text-align: center;
        white-space: nowrap;
        background: rgba(251, 191, 36, 0.1);
        border: 1px solid rgba(251, 191, 36, 0.3);
        border-radius: 999px;
        padding: 3px 14px;
        margin-bottom: 4px;
        font-size: 13px;
        line-height: 1;
        color: rgba(251, 191, 36, 0.8);
      }
      .crescent-badge span {
        display: inline;
        vertical-align: middle;
        line-height: 1;
        margin: 0 3px;
      }

      /*========================================== 
            starting animation
        ==========================================*/

      .right-slide-animation {
        opacity: 0;
        animation: slideRight 1s ease forwards;
        animation-delay: 0.3s;
      }

      .left-slide-animation {
        opacity: 0;
        animation: slideLeft 1s ease forwards;
        animation-delay: 0.3s;
      }

      .top-slide-animation {
        opacity: 0;
        animation: slideTop 1s ease forwards;
        animation-delay: 0.3s;
      }

      .bottom-slide-animation {
        opacity: 0;
        animation: slideBottom 1s ease forwards;
        animation-delay: 0.3s;
      }

      @keyframes slideRight {
        0% {
          transform: translateX(-100px);
          opacity: 0;
        }

        100% {
          transform: translateX(0px);
          opacity: 1;
        }
      }

      @keyframes slideLeft {
        0% {
          transform: translateX(100px);
          opacity: 0;
        }

        100% {
          transform: translateX(0px);
          opacity: 1;
        }
      }

      @keyframes slideTop {
        0% {
          transform: translateY(-100px);
          opacity: 0;
        }

        100% {
          transform: translateY(0px);
          opacity: 1;
        }
      }

      @keyframes slideBottom {
        0% {
          transform: translateY(100px);
          opacity: 0;
        }

        100% {
          transform: translateY(0px);
          opacity: 1;
        }
      }
    </style>
  </head>

  <body
    class="flex items-start sm:items-center justify-center min-h-screen backdrop-blur-sm overflow-y-auto"
    style="
      background:
        url(&quot;./images/bg-01.jpg&quot;),
        linear-gradient(
          0deg,
          rgba(83, 84, 84, 0.97) 0%,
          rgba(106, 106, 105, 0.975) 100%
        );
      background-blend-mode: overlay;
      background-size: cover;
      background-position: center;
    "
  >
    <!-- Language Toggle Button -->
    <button
      id="btnLangToggle"
      onclick="toggleLang()"
      class="fixed top-4 right-4 z-50 bg-gray-800/70 text-white text-sm px-3 py-1.5 rounded-full border border-gray-600 hover:bg-gray-700 transition-colors"
    >
      বাংলা
    </button>

    <div
      class="p-4 shadow-2xl text-center w-full max-w-sm sm:max-w-md mx-auto my-6 rounded-xl"
      style="
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.07);
      "
    >
      <h2
        id="pageHeading"
        class="text-xl sm:text-3xl font-bold text-amber-300 pb-3 top-slide-animation tracking-wide"
        style="
          font-family: &quot;Winky Sans&quot;, sans-serif;
          text-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        "
      >
        Get Your Eid E-Card
      </h2>
      <div
        id="ecard"
        class="relative w-full aspect-square p-4 flex flex-col items-center justify-center shadow-md overflow-hidden"
      >
        <!-- Template overlay (top-right) -->
        <div class="absolute top-3 right-0 text-white opacity-60">
          <img src="./images/template.png" alt="" />
        </div>

        <h1
          id="cardTitle"
          class="title-shimmer text-3xl sm:text-4xl font-bold drop-shadow-lg tracking-widest"
          style="font-family: &quot;Dancing Script&quot;, cursive"
        >
          EID MUBARAK !
        </h1>

        <!-- Ornamental divider -->
        <div class="ornamental-divider">✦</div>

        <p
          id="nameText"
          class="text-sm text-amber-50/90 drop-shadow-lg px-4 text-center"
          style="font-family: &quot;Winky Sans&quot;, sans-serif"
        >
          [Write your note]
        </p>

        <!-- Ornamental divider (bottom) -->
        <div class="ornamental-divider" style="margin-top: 8px">✦</div>

        <!-- Hadith styled block -->
        <div class="hadith-block">
          <p
            id="hadithText"
            class="text-xs text-amber-100/90 italic text-center drop-shadow-lg leading-relaxed"
            style="font-family: &quot;Winky Sans&quot;, sans-serif"
          ></p>
        </div>

        <p
          class="absolute text-gray-500/45 bottom-2 right-2 text-xs tracking-wide"
        >
          القدس الحرة
        </p>
        <p class="absolute text-gray-600/40 bottom-2 left-2 text-xs">
          https://eidcard-mfr.vercel.app/
        </p>
      </div>
      <label for="nameInput" class="sr-only"
        >Write your personalised note</label
      >
      <input
        type="text"
        id="nameInput"
        placeholder="Write your note .."
        class="p-2.5 rounded-lg bg-gray-900/60 text-white w-full mt-4 focus:outline-none focus:ring-1 focus:ring-amber-500/50 border border-white/10 placeholder-gray-500 text-sm transition-all"
        oninput="livePreviewName(this.value)"
      />

      <!-- Hidden file input for custom background -->
      <input
        type="file"
        id="bgImageInput"
        accept="image/*"
        class="hidden"
        onchange="importBgImage(event)"
      />

      <!-- Custom Background full-width button -->
      <button
        id="btnImportImage"
        onclick="document.getElementById('bgImageInput').click()"
        class="text-amber-200 w-full py-2 rounded-lg mt-2 text-sm font-medium transition-all hover:brightness-110 active:scale-95"
        style="
          background: linear-gradient(
            135deg,
            rgba(120, 80, 10, 0.7),
            rgba(92, 55, 5, 0.7)
          );
          border: 1px solid rgba(251, 191, 36, 0.25);
        "
      >
        🖼 Custom Background
      </button>

      <!-- Buttons row -->
      <div class="flex justify-center gap-2 mt-2">
        <!-- "Generate" Button -->
        <button
          id="btnGenerate"
          onclick="updateCard()"
          class="flex-1 text-white px-4 py-2.5 rounded-lg text-sm font-semibold right-slide-animation transition-all hover:brightness-110 active:scale-95"
          style="
            background: linear-gradient(135deg, #14532d, #166534);
            border: 1px solid rgba(74, 222, 128, 0.2);
          "
        >
          ✨ Generate
        </button>

        <!-- "Download JPG" Button -->
        <button
          id="btnDownloadJPG"
          onclick="downloadJPG()"
          class="flex-1 text-white px-4 py-2.5 rounded-lg text-sm font-semibold left-slide-animation transition-all hover:brightness-110 active:scale-95"
          style="
            background: linear-gradient(135deg, #92400e, #b45309);
            border: 1px solid rgba(251, 191, 36, 0.25);
          "
        >
          ⬇ Download
        </button>

        <!-- "Share" Button -->
        <button
          id="btnShare"
          onclick="shareCard()"
          class="flex-1 text-white px-4 py-2.5 rounded-lg text-sm font-semibold transition-all hover:brightness-110 active:scale-95"
          style="
            background: linear-gradient(135deg, #1e3a5f, #1d4ed8);
            border: 1px solid rgba(96, 165, 250, 0.2);
          "
        >
          ↗ Share
        </button>
      </div>

      <p id="downloadStatus" class="text-gray-400 text-xs pt-2">
        Click Generate, then Download or Share.
      </p>
      <p id="statusHint" class="text-gray-500 text-xs pt-0.5">
        Click Generate again to change image &amp; reminder.
      </p>
    </div>

    <a
      href="https://github.com/mfbhai10"
      target="_blank"
      class="fixed bottom-4 right-4 text-gray-400 px-3 py-2 rounded-full shadow-lg text-xs hover:text-amber-300 transition-colors"
      style="
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(4px);
      "
    >
      🎁 Gift from
    </a>

    <script>
      let currentLang = "en";

      const hadithsBn = [
        "নবী (ﷺ) বলেছেন, 'যে ব্যক্তি ঈমান ও সওয়াবের আশায় রমজান মাসে রোজা রাখে, তার পূর্বের গুনাহ মাফ করে দেওয়া হয়।' (সহিহ বুখারি)",
        "নবী (ﷺ) বলেছেন, 'ঈদুল ফিতর হলো পুরস্কারের দিন, আনন্দের দিন এবং এমন একটি দিন যেদিন আল্লাহ রোজাদার ও নামাজিদের গুনাহ মাফ করে দেন।' (সহিহ মুসলিম)",
        "নবী (ﷺ) বলেছেন, 'ঈদের দিন প্রতিটি মুসলিমের উপর ফিতরা আদায় করা ওয়াজিব, যা রোজাকে পবিত্র করে এবং অভাবীদের সাহায্য করে।' (সহিহ বুখারি)",
        "নবী (ﷺ) বলেছেন, 'ঈদের দিন আল্লাহ তাঁর বান্দাদের দিকে তাকান এবং রোজাদারদের ক্ষমা করে দেন।' (সহিহ মুসলিম)",
        "নবী (ﷺ) বলেছেন, 'যে ব্যক্তি ঈদের দিন কোনো অভাবীকে সাহায্য করে, আল্লাহ তাকে তাঁর রহমত দান করবেন।' (সুনান ইবনে মাজাহ)",
        "নবী (ﷺ) বলেছেন, 'রমজানের পরে সর্বোত্তম রোজা হলো আরাফার দিনের রোজা।' (সহিহ মুসলিম)",
        "নবী (ﷺ) বলেছেন, 'ঈদের দিনে দেওয়া সদকার চেয়ে উত্তম কোনো সদকা নেই।' (সহিহ মুসলিম)",
        "নবী (ﷺ) বলেছেন, 'ঈদের দিন অভাবীদের সাহায্যে উদারভাবে দান করো।' (সুনান আবু দাউদ)",
        "নবী (ﷺ) বলেছেন, 'ঈদের দিন আল্লাহ তাঁর ফেরেশতাদের পাঠান যারা ডেকে বলেন: হে রোজাদাররা, এগিয়ে আসো এবং তোমাদের প্রভুর কাছ থেকে পুরস্কার গ্রহণ করো।' (সহিহ মুসলিম)",
        "নবী (ﷺ) বলেছেন, 'তোমার সম্পদের একটি অংশ অভাবীদের দাও, বিশেষত ঈদের দিনে।' (সহিহ বুখারি)",
        "নবী (ﷺ) বলেছেন, 'ঈদ হলো আনন্দের দিন, যেদিন মানুষ দান করে এবং ভালো কাজ বাড়ায়।' (সহিহ বুখারি)",
        "নবী (ﷺ) বলেছেন, 'সকালে ঈদের নামাজ পড়ো এবং ফিতরা আদায় করো, যাতে নিজেকে ও সম্পদকে পবিত্র করতে পারো।' (সুনান ইবনে মাজাহ)",
        "নবী (ﷺ) বলেছেন, 'জামাতে ঈদের নামাজ পড়া সুন্নত।' (সহিহ বুখারি)",
        "নবী (ﷺ) বলেছেন, 'ঈদে একে অপরকে উপহার দাও, কারণ এটি তোমাদের মধ্যে ভালোবাসা বাড়ায়।' (সহিহ মুসলিম)",
        "নবী (ﷺ) বলেছেন, 'ঈদের দিন অন্যদের, বিশেষত সুবিধাবঞ্চিতদের, সাহায্য করে আনন্দ ছড়িয়ে দেওয়ার সময়।' (সহিহ বুখারি)",
        "নবী (ﷺ) বলেছেন, 'যে ব্যক্তি ঈদের নামাজ পড়ে, তার গুনাহ মাফ করা হবে এবং আল্লাহর কাছে তার মর্যাদা বাড়ানো হবে।' (সহিহ বুখারি)",
        "নবী (ﷺ) বলেছেন, 'ঈদ আনন্দ করার সময়, কিন্তু সর্বোত্তম আনন্দ হলো অভাবীদের সাহায্য করা।' (সুনান আবু দাউদ)",
        "নবী (ﷺ) বলেছেন, 'ঈদে দান করো, কারণ এটি তোমার সম্পদকে পবিত্র করে এবং আল্লাহর পুরস্কার অর্জন করে।' (সহিহ মুসলিম)",
        "নবী (ﷺ) বলেছেন, 'অন্যদের সাহায্য করো, বিশেষত ঈদের দিনে, কারণ এই দিনে দান করার চেয়ে বড় পুরস্কার আর নেই।' (সুনান ইবনে মাজাহ)",
        "নবী (ﷺ) বলেছেন, 'ঈদ হলো আল্লাহকে ধন্যবাদ দেওয়ার এবং রোজাকে পবিত্র করতে দান করার সময়।' (সহিহ বুখারি)",
        "নবী (ﷺ) বলেছেন, 'তোমার ঈদ উদযাপনকে অন্যদের সাহায্য করার সময় হিসেবে নাও, এবং আল্লাহ তোমাকে ইহকাল ও পরকালে পুরস্কৃত করবেন।' (সুনান ইবনে মাজাহ)",
        "নবী (ﷺ) বলেছেন, 'ঈদের দিন আত্মপর্যালোচনা, আল্লাহকে ধন্যবাদ প্রদান এবং অন্যদের দানের সময়।' (সহিহ বুখারি)",
        "নবী (ﷺ) বলেছেন, 'ঈদের দিন নিশ্চিত করো যে কেউ ক্ষুধার্ত না থাকে এবং অভাবীদের খাওয়ানোর চেষ্টা করো।' (সহিহ বুখারি)",
        "নবী (ﷺ) বলেছেন, 'ঈদের নামাজের আগে ফিতরা আদায় করো যাতে গরিবরা ঈদের দিন আনন্দ করতে পারে।' (সহিহ মুসলিম)",

      function toggleLang() {
        currentLang = currentLang === "en" ? "bn" : "en";
        const t = i18n[currentLang];
        document.getElementById("pageHeading").textContent = t.pageHeading;
        document.getElementById("cardTitle").textContent = t.cardTitle;
        document.getElementById("cardTitle").style.fontFamily =
          currentLang === "bn"
            ? "'Galada', cursive"
            : "'Dancing Script', cursive";
        document.getElementById("btnLangToggle").textContent = t.btnLangToggle;
        document.getElementById("btnGenerate").textContent = t.btnGenerate;
        document.getElementById("btnImportImage").textContent =
          t.btnImportImage;
        document.getElementById("btnDownloadJPG").textContent =
          t.btnDownloadJPG;
        document.getElementById("btnShare").textContent = t.btnShare;
        document.getElementById("statusHint").textContent = t.statusHint;
        document.getElementById("nameInput").placeholder = t.placeholder;
        const currentNote = document.getElementById("nameInput").value;
        document.getElementById("nameText").textContent = currentNote
          ? t.notePrefix + currentNote
          : t.noteDefault;
        const pool = currentLang === "en" ? hadiths : hadithsBn;
        document.getElementById("hadithText").textContent =
          pool[Math.floor(Math.random() * pool.length)];
        const status = document.getElementById("downloadStatus");
        const prevDefault =
          currentLang === "en" ? i18n.bn.statusDefault : i18n.en.statusDefault;
        if (status.textContent === prevDefault) {
          status.textContent = t.statusDefault;
        }
      }

        "The Prophet (ﷺ) said, 'Give to the poor during Eid, so that they may feel joy and not be in need.' (Sahih Bukhari)",
        "The Prophet (ﷺ) said, 'Eid is a time of community and unity. Help each other and strengthen your bonds.' (Sahih Bukhari)",
      ];

      // Shared download resolution — 4× is high quality without crashing low-memory devices
      const SCALE_FACTOR = 4;

      /**
       * html2canvas cannot render -webkit-background-clip:text (shimmer) or
       * backdrop-filter. Before capturing we swap those to solid equivalents,
       * then restore them afterwards so the live preview is unaffected.
       */
      function prepareForCapture() {
        const title = document.getElementById("cardTitle");
        // Store original shimmer styles
        title.dataset.origBackground = title.style.background || "";
        title.dataset.origWebkitTextFill =
          title.style.webkitTextFillColor || "";
        title.dataset.origBackgroundClip = title.style.backgroundClip || "";
        title.dataset.origAnimation = title.style.animation || "";
        // Apply solid gold fallback
        title.style.background = "none";
        title.style.webkitTextFillColor = "#fbbf24";
        title.style.backgroundClip = "unset";
        title.style.animation = "none";
        title.style.color = "#fbbf24";
        title.classList.remove("title-shimmer");

        // html2canvas does not support CSS aspect-ratio — fix by:
        //  1. Removing the Tailwind aspect-square class entirely
        //  2. Locking the card to explicit px dimensions
        const card = document.getElementById("ecard");
        const rect = card.getBoundingClientRect();
        card.dataset.origWidth = card.style.width || "";
        card.dataset.origHeight = card.style.height || "";
        card.dataset.hadAspectSquare = card.classList.contains("aspect-square")
          ? "1"
          : "0";
        card.classList.remove("aspect-square"); // remove so html2canvas sees no aspect-ratio
        card.style.width = rect.width + "px";
        card.style.height = rect.width + "px"; // enforce square
      }

      function restoreAfterCapture() {
        const title = document.getElementById("cardTitle");
        title.style.background = title.dataset.origBackground;
        title.style.webkitTextFillColor = title.dataset.origWebkitTextFill;
        title.style.backgroundClip = title.dataset.origBackgroundClip;
        title.style.animation = title.dataset.origAnimation;
        title.style.color = "";
        title.classList.add("title-shimmer");

        const card = document.getElementById("ecard");
        if (card.dataset.hadAspectSquare === "1")
          card.classList.add("aspect-square");
        card.style.width = card.dataset.origWidth;
        card.style.height = card.dataset.origHeight;
      }

      const images = [
        "./images/card-img-01.jpg",
        "./images/card-img-02.jpg",
        "./images/card-img-03.jpg",
        "./images/card-img-04.jpg",
        "./images/card-img-05.jpg",
        "./images/card-img-06.jpg",
        "./images/card-img-07.jpg",
        "./images/card-img-08.jpg",
        "./images/card-img-09.jpg",
        "./images/card-img-10.jpg",
        "./images/card-img-11.jpg",
        "./images/card-img-12.jpg",
        "./images/card-img-13.jpg",
        "./images/card-img-14.jpg",
        "./images/card-img-15.jpg",
        "./images/card-img-16.jpg",
        "./images/card-img-17.jpg",
        "./images/card-img-18.jpg",
        "./images/card-img-19.jpg",
        "./images/card-img-20.jpg",
        "./images/card-img-21.jpg",
        "./images/card-img-22.jpg",
        "./images/card-img-23.jpg",
        "./images/card-img-24.jpg",
        "./images/card-img-25.jpg",
        "./images/card-img-26.jpg",
        "./images/card-img-27.jpg",
        "./images/card-img-28.jpg",
        "./images/card-img-29.jpg",
      ];

      // Preload all card images after the page loads so Generate doesn't flicker
      function preloadImages() {
        images.forEach((src) => {
          const img = new Image();
          img.src = src;
        });
      }

      function setDownloadBusy(busy) {
        const status = document.getElementById("downloadStatus");
        const btnJPG = document.getElementById("btnDownloadJPG");
        if (busy) {
          status.textContent =
            currentLang === "bn"
              ? "⏳ আপনার কার্ড প্রস্তুত হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন…"
              : "⏳ Preparing your card, please wait…";
          btnJPG.disabled = true;
          btnJPG.classList.add("opacity-50", "cursor-not-allowed");
        } else {
          status.textContent =
            currentLang === "bn"
              ? "✅ সম্পন্ন! আপনার ডাউনলোড ফোল্ডার চেক করুন।"
              : "✅ Done! Check your downloads folder.";
          btnJPG.disabled = false;
          btnJPG.classList.remove("opacity-50", "cursor-not-allowed");
        }
      }

      function resetCard() {
        document.getElementById("nameInput").value = "";
        document.getElementById("nameText").textContent = "[Write your note]";
        const hadithText = document.getElementById("hadithText");
        hadithText.textContent =
          hadiths[Math.floor(Math.random() * hadiths.length)];
        const ecard = document.getElementById("ecard");
        ecard.style.backgroundImage = "";
        document.getElementById("downloadStatus").textContent =
          "Click Generate, then Download or Share.";
      }

      function updateCard() {
        const t = i18n[currentLang];
        // Get user name input
        const nameInput = document.getElementById("nameInput").value;
        const nameText = document.getElementById("nameText");
        nameText.textContent = nameInput
          ? t.notePrefix + nameInput
          : t.notePrefixNoName;

        // Set a random hadith in current language
        const hadithText = document.getElementById("hadithText");
        const pool = currentLang === "en" ? hadiths : hadithsBn;
        const randomHadith = pool[Math.floor(Math.random() * pool.length)];
        hadithText.textContent = randomHadith;
        hadithText.classList.remove("hidden"); // Make hadith visible

        // Set a random background image
        const ecard = document.getElementById("ecard");
        const randomImage = images[Math.floor(Math.random() * images.length)];

        ecard.style.backgroundImage = `linear-gradient(0deg, rgba(0,35,36,0.8) 0%, rgba(72, 72, 62, 0.7) 100%), url('${randomImage}'), linear-gradient(0deg, rgba(0,35,36,0.5) 0%, rgba(72, 72, 62, 0.5) 100%)`;
        ecard.style.backgroundBlendMode = "overlay";
        ecard.style.backgroundSize = "cover";
        ecard.style.backgroundPosition = "center";
      }

      // function for downloading jpg format
      async function downloadJPG() {
        setDownloadBusy(true);
        prepareForCapture();
        try {
          const card = document.getElementById("ecard");

          // Wait for all fonts to finish loading so text layout is stable
          await document.fonts.ready;

          const cardW = card.offsetWidth;
          const canvas = await html2canvas(card, {
            scale: SCALE_FACTOR,
            useCORS: true,
            width: cardW,
            height: cardW,
            windowWidth: window.innerWidth,
          });

          restoreAfterCapture();

          // Use canvas.toBlob for efficiency instead of manual base64 decode
          canvas.toBlob(
            (blob) => {
              const link = document.createElement("a");
              link.href = URL.createObjectURL(blob);
              link.download = "Eid_Card_MH.jpg";
              link.click();
              setDownloadBusy(false);
            },
            "image/jpeg",
            1.0,
          );
        } catch (err) {
          restoreAfterCapture();
          console.error("JPG download failed:", err);
          document.getElementById("downloadStatus").textContent =
            "❌ Download failed. Try again.";
          document.getElementById("btnDownloadJPG").disabled = false;
          document
            .getElementById("btnDownloadJPG")
            .classList.remove("opacity-50", "cursor-not-allowed");
        }
      }

      // Share card using Web Share API; falls back to copying a message to clipboard
      async function shareCard() {
        const card = document.getElementById("ecard");
        const status = document.getElementById("downloadStatus");
        prepareForCapture();
        try {
          // Wait for all fonts to finish loading so text layout is stable
          await document.fonts.ready;
          const cardW = card.offsetWidth;
          const canvas = await html2canvas(card, {
            scale: SCALE_FACTOR,
            useCORS: true,
            width: cardW,
            height: cardW,
            windowWidth: window.innerWidth,
          });
          restoreAfterCapture();
          canvas.toBlob(
            async (blob) => {
              const file = new File([blob], "Eid_Card_MH.jpg", {
                type: "image/jpeg",
              });
              if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({
                  title: "Eid Mubarak!",
                  text: "Wishing you a blessed Eid! 🌙",
                  files: [file],
                });
                status.textContent = "✅ Shared successfully!";
              } else if (navigator.share) {
                await navigator.share({
                  title: "Eid Mubarak!",
                  text: "Wishing you a blessed Eid! 🌙",
                });
                status.textContent = "✅ Shared successfully!";
              } else {
                await navigator.clipboard.writeText(
                  "Wishing you a blessed Eid Mubarak! 🌙 Check out https://eidcard-mfr.vercel.app/",
                );
                status.textContent = "📋 Share link copied to clipboard!";
              }
            },
            "image/jpeg",
            1.0,
          );
        } catch (err) {
          restoreAfterCapture();
          if (err.name !== "AbortError") {
            console.error("Share failed:", err);
            status.textContent = "❌ Share failed. Try downloading instead.";
          }
        }
      }

      // Import a custom background image from the user's device
      function importBgImage(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          const ecard = document.getElementById("ecard");
          ecard.style.backgroundImage = `linear-gradient(0deg, rgba(0,35,36,0.8) 0%, rgba(72, 72, 62, 0.7) 100%), url('${e.target.result}')`;
          ecard.style.backgroundBlendMode = "overlay";
          ecard.style.backgroundSize = "cover";
          ecard.style.backgroundPosition = "center";
          document.getElementById("downloadStatus").textContent =
            i18n[currentLang].statusCustomBg;
        };
        reader.readAsDataURL(file);
        // Reset input so the same file can be re-selected if needed
        event.target.value = "";
      }

      // Load a random hadith and preload images when the page loads
      document.addEventListener("DOMContentLoaded", () => {
        const hadithText = document.getElementById("hadithText");
        hadithText.textContent =
          hadiths[Math.floor(Math.random() * hadiths.length)];
        preloadImages();
      });
    </script>
  </body>
